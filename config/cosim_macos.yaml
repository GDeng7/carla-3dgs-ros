# macOS co-simulation — NO CARLA, NO CUDA, NO NuRec
#
# Develop and test the co-sim pipeline on your Mac:
#   synthetic/replayed poses → CPU preview renderer → optional ROS2
#
# For full gsplat rendering, run run_cosim.py on Linux + RTX 5090.

mode: cosim_macos

simulator:
  trajectory: straight        # straight | circle | replay
  speed_mps: 10.0
  duration_sec: 10.0
  tick_hz: 20.0
  realtime: true
  start_position: [0.0, 0.0, 0.0]
  start_yaw_deg: 0.0
  circle_radius_m: 30.0
  # For trajectory=replay: poses exported from CARLA on Linux
  replay_file: "assets/poses/example_poses.json"

renderer:
  backend: preview            # preview | mock  (gsplat needs CUDA — use Linux)
  device: cpu
  scene_path: "assets/scenes/your_map.ply"
  width: 1280
  height: 720
  fov: 90.0
  near_plane: 0.01
  far_plane: 1000.0
  background_color: [0.0, 0.0, 0.0]

alignment:
  offset: [0.0, 0.0, 0.0]
  yaw_offset_deg: 0.0

camera:
  position: [2.0, 0.0, 1.5]
  rotation: [0.0, 0.0, 0.0]

output:
  save_frames: false
  dir: "output/macos_frames"

ros2:
  namespace: "world_sim"
  ego_name: "ego"
  frame_id: "front_camera"
  publish_rate_hz: 20
  topics:
    image: "camera/front/image_raw"
    camera_info: "camera/front/camera_info"